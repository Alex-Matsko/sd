services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sd}
      POSTGRES_DB: ${POSTGRES_DB:-sd}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sd}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sd}:${POSTGRES_PASSWORD:-sd}@db:5432/${POSTGRES_DB:-sd}
    volumes:
      - attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  db_data:
  attachments:
