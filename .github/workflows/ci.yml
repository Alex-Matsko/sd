name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure environment
        run: cp .env.example .env

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for app to become healthy
        run: |
          for i in $(seq 1 60); do
            cid=$(docker compose ps -q app)
            status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "starting")
            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done
          echo "::error::app container never became healthy"
          docker compose logs
          exit 1

      # Same command used for local development (README.md) - tests always
      # run inside the app container's image, never on the bare runner.
      - name: Run backend test suite
        run: docker compose exec -T app sh -c "pip install -q -r requirements-dev.txt && python -m pytest tests/ -q"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # Auto-deploy to staging only after both test jobs pass, and only for the
  # staging branch - production is a separate, manually-triggered workflow
  # (deploy-production.yml) since that one touches customer data.
  deploy-staging:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_APP_DIR }}
            git fetch origin staging
            git reset --hard origin/staging
            docker compose up -d --build
            sleep 5
            curl -sf http://localhost:${HTTP_PORT:-80}/health || (echo "::error::staging /health check failed after deploy" && exit 1)
